server:
  port: 8081

spring:
  application:
    name: payment-processor

  datasource:
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # 🔹 Durability: ensures message is written to all replicas
      acks: all
      # 🔹 Batch messages to improve throughput
      linger-ms: 10

      # 🔹 Batch size (in bytes)
      batch-size: 65536   # 64 KB

      # 🔹 Compress messages to reduce network usage
      compression-type: snappy

      # 🔹 Retry on transient failures
      retries: 5

      # 🔹 Timeout for broker response
      request-timeout-ms: 30000

      # 🔹 Delivery timeout (total time for retries)
      delivery-timeout-ms: 120000

      properties:
        enable.idempotence: true

    consumer:
      group-id: payment-processor-group

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      # 🔹 Read from beginning if no offset exists (safe for restart)
      auto-offset-reset: earliest

      # 🔹 Disable auto commit for reliability
      enable-auto-commit: false

      # 🔹 Max records per poll (batch size)
      max-poll-records: 500

      # 🔹 Max time between polls before rebalance
      max-poll-interval-ms: 300000

      properties:
        # 🔹 Trust package for JSON deserialization
        spring.json.trusted.packages: "*"
        # 🔹 Don't rely on producer's type header (which may reference classes not on this classpath)
        #    Tell the deserializer to ignore type headers and use the configured default type instead.
        spring.json.use.type.headers: false
        # 🔹 When headers are ignored, deserialize JSON into this local class
        spring.json.value.default.type: com.lloyds.payments.dto.PaymentEvent

      listener:
        # 🔹 Parallel consumers (match Kafka partitions)
        concurrency: 6

        # 🔹 Commit offsets after batch processing
        ack-mode: BATCH

        # 🔹 Improve throughput by consuming in batches
        type: batch
  #        listener:
  #          ack-mode: manual
  #          concurrency: 3


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
logging:
  level:
    root: INFO
    org.springframework.kafka: DEBUG
    org.springframework.kafka.retrytopic: DEBUG
    org.springframework.kafka.listener: ERROR
    org.apache.kafka.clients.consumer: ERROR
    org.apache.kafka.clients.producer: INFO